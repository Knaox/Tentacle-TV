# Tentacle TV — Automated Release Build
#
# Triggers on push of a tag matching v* (e.g. v1.0.0, v0.9.2-beta.1)
# Builds the Tauri desktop app for Windows and creates a draft GitHub Release
# with .msi and -setup.exe installers attached.
#
# Secrets requis (à configurer dans GitHub → Settings → Secrets → Actions) :
#
# OPTIONNEL - Signature Windows (si tu as un certificat code-signing) :
#   WINDOWS_CERTIFICATE          : Certificat .pfx encodé en base64
#   WINDOWS_CERTIFICATE_PASSWORD : Mot de passe du certificat .pfx
#
# REQUIS - Signature updater Tauri (pour les mises à jour automatiques) :
#   TAURI_SIGNING_PRIVATE_KEY          : Clé privée pour signer les updates
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD : Mot de passe de la clé (vide si aucun)

name: Release Desktop

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0

jobs:
  release:
    name: Build & Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install dependencies (monorepo)
        run: pnpm install --frozen-lockfile

      - name: Build & create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signature updater Tauri
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Signature Windows (optionnel)
          TAURI_BUNDLE_WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          TAURI_BUNDLE_WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Tentacle TV ${{ github.ref_name }}"
          releaseBody: |
            Voir le [changelog](https://github.com/Knaox/Tentacle-TV/blob/main/CHANGELOG.md) pour les détails.

            ## Installation
            - **Windows (installeur)** : télécharger le fichier `-setup.exe`
            - **Windows (MSI)** : télécharger le fichier `.msi`
          releaseDraft: true
          prerelease: false
