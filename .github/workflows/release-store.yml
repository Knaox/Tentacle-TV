# Tentacle TV — Microsoft Store Build
#
# Workflow manuel pour générer le setup.exe à soumettre sur le Microsoft
# Partner Center.
#
# Ce workflow utilise la config tauri.microsoftstore.conf.json qui désactive
# transparent (incompatible avec le sandbox Store). WebView2 est déjà
# préinstallé sur Windows 10/11, donc on ne l'embarque PAS.
#
# Secrets requis : mêmes que release.yml (voir commentaires là-bas)

name: Build Microsoft Store

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (ex: v0.9.2)"
        required: true
        type: string

concurrency:
  group: release-store-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0

jobs:
  store-build:
    name: Build Store Package (Windows)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install dependencies (monorepo)
        run: pnpm install --frozen-lockfile

      - name: Build for Microsoft Store
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_BUNDLE_WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          TAURI_BUNDLE_WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          args: --config src-tauri/tauri.microsoftstore.conf.json --bundles nsis
          tagName: ${{ inputs.version }}
          releaseName: "Tentacle TV ${{ inputs.version }} (Store)"
          releaseBody: |
            Build Microsoft Store pour soumission au Partner Center.
            WebView2 préinstallé sur Windows 10/11 (pas d'offline installer).
          releaseDraft: true
          prerelease: false
