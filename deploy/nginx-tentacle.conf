server {
    listen 443 ssl http2;
    server_name tentacle.rouge-informatique.ch;

    root /var/www/tentacle;
    index index.html;

    # ─── SSL (adapter les chemins si certbot/autre) ───
    ssl_certificate     /etc/letsencrypt/live/tentacle.rouge-informatique.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tentacle.rouge-informatique.ch/privkey.pem;

    # ─── Cache: index.html JAMAIS caché ───
    # Le navigateur re-vérifie à chaque visite et découvre les nouveaux assets hashés
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # ─── Cache: assets Vite (hash dans le nom) = cache agressif ───
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ─── SPA: toutes les routes → index.html ───
    location / {
        try_files $uri $uri/ /index.html;

        # Pour les fichiers non-asset (favicon, manifeste, etc.) : cache court
        add_header Cache-Control "no-cache";
    }

    # ─── API proxy → backend Node.js ───
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name tentacle.rouge-informatique.ch;
    return 301 https://$host$request_uri;
}
