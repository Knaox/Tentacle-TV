<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 560" width="512" height="560">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="tentacleGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#DB2777"/>
    </linearGradient>
    <linearGradient id="tentacleGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333EA"/>
      <stop offset="100%" style="stop-color:#F472B6"/>
    </linearGradient>
    <linearGradient id="cheekGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F9A8D4"/>
      <stop offset="100%" style="stop-color:#F472B6"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="hatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D2D2D"/>
      <stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
    <linearGradient id="hatBandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="skullGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E2E8F0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7C3AED" flood-opacity="0.3"/>
    </filter>
    <filter id="hatShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ============ TENTACLES ============ -->
  
  <!-- Back tentacles -->
  <path d="M160 358 Q120 418 100 468 Q85 508 110 528 Q130 543 145 518 Q160 493 155 448 Q152 418 170 388" 
        fill="url(#tentacleGrad1)" opacity="0.85"/>
  <path d="M352 358 Q392 418 412 468 Q427 508 402 528 Q382 543 367 518 Q352 493 357 448 Q360 418 342 388" 
        fill="url(#tentacleGrad1)" opacity="0.85"/>

  <!-- Far tentacles -->
  <path d="M140 348 Q90 388 60 448 Q40 498 65 523 Q88 546 100 508 Q115 468 120 428 Q125 398 150 368" 
        fill="url(#tentacleGrad2)" opacity="0.8"/>
  <path d="M372 348 Q422 388 452 448 Q472 498 447 523 Q424 546 412 508 Q397 468 392 428 Q387 398 362 368" 
        fill="url(#tentacleGrad2)" opacity="0.8"/>

  <!-- Front tentacles -->
  <path d="M185 363 Q165 428 150 478 Q138 518 160 536 Q180 550 188 520 Q195 490 195 448 Q195 413 200 383" 
        fill="url(#tentacleGrad1)"/>
  <path d="M327 363 Q347 428 362 478 Q374 518 352 536 Q332 550 324 520 Q317 490 317 448 Q317 413 312 383" 
        fill="url(#tentacleGrad1)"/>
  
  <path d="M220 373 Q210 438 205 488 Q200 523 220 538 Q240 548 242 516 Q244 484 240 448 Q237 418 235 388" 
        fill="url(#tentacleGrad2)"/>
  <path d="M292 373 Q302 438 307 488 Q312 523 292 538 Q272 548 270 516 Q268 484 272 448 Q275 418 277 388" 
        fill="url(#tentacleGrad2)"/>

  <!-- Suction cups -->
  <circle cx="108" cy="498" r="5" fill="#DDD6FE" opacity="0.5"/>
  <circle cx="150" cy="506" r="5" fill="#DDD6FE" opacity="0.5"/>
  <circle cx="215" cy="510" r="4" fill="#DDD6FE" opacity="0.5"/>
  <circle cx="297" cy="510" r="4" fill="#DDD6FE" opacity="0.5"/>
  <circle cx="362" cy="506" r="5" fill="#DDD6FE" opacity="0.5"/>
  <circle cx="404" cy="498" r="5" fill="#DDD6FE" opacity="0.5"/>
  
  <circle cx="95" cy="473" r="4" fill="#DDD6FE" opacity="0.4"/>
  <circle cx="145" cy="483" r="4" fill="#DDD6FE" opacity="0.4"/>
  <circle cx="210" cy="488" r="3.5" fill="#DDD6FE" opacity="0.4"/>
  <circle cx="302" cy="488" r="3.5" fill="#DDD6FE" opacity="0.4"/>
  <circle cx="367" cy="483" r="4" fill="#DDD6FE" opacity="0.4"/>
  <circle cx="417" cy="473" r="4" fill="#DDD6FE" opacity="0.4"/>

  <!-- ============ BODY ============ -->
  
  <ellipse cx="256" cy="268" rx="130" ry="140" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  <ellipse cx="240" cy="223" rx="80" ry="70" fill="url(#shineGrad)" opacity="0.5"/>

  <!-- ============ FACE ============ -->

  <!-- Eyes - white -->
  <ellipse cx="210" cy="263" rx="38" ry="42" fill="white"/>
  <ellipse cx="302" cy="263" rx="38" ry="42" fill="white"/>
  
  <!-- Eyes - iris -->
  <ellipse cx="215" cy="268" rx="22" ry="26" fill="#1E1B4B"/>
  <ellipse cx="307" cy="268" rx="22" ry="26" fill="#1E1B4B"/>
  
  <!-- Eyes - pupil -->
  <ellipse cx="218" cy="266" rx="12" ry="14" fill="#0F0A2A"/>
  <ellipse cx="310" cy="266" rx="12" ry="14" fill="#0F0A2A"/>
  
  <!-- Eyes - shine -->
  <circle cx="224" cy="256" r="8" fill="white" opacity="0.9"/>
  <circle cx="316" cy="256" r="8" fill="white" opacity="0.9"/>
  <circle cx="212" cy="272" r="4" fill="white" opacity="0.5"/>
  <circle cx="304" cy="272" r="4" fill="white" opacity="0.5"/>

  <!-- Eyebrows -->
  <path d="M180 230 Q195 220 225 226" stroke="#6D28D9" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M287 226 Q317 220 332 230" stroke="#6D28D9" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M228 316 Q256 343 284 316" stroke="#6D28D9" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Cheeks -->
  <ellipse cx="170" cy="303" rx="20" ry="14" fill="url(#cheekGrad)" opacity="0.45"/>
  <ellipse cx="342" cy="303" rx="20" ry="14" fill="url(#cheekGrad)" opacity="0.45"/>

  <!-- ============ PIRATE HAT ============ -->
  
  <!-- Hat brim (wide ellipse) -->
  <ellipse cx="256" cy="155" rx="155" ry="22" fill="#1A1A1A" filter="url(#hatShadow)"/>
  <ellipse cx="256" cy="153" rx="150" ry="18" fill="#2D2D2D"/>
  <ellipse cx="256" cy="151" rx="145" ry="14" fill="url(#hatGrad)"/>
  
  <!-- Hat body (tricorn shape) -->
  <path d="M145 155 Q140 100 165 60 Q195 20 256 8 Q317 20 347 60 Q372 100 367 155 Z" 
        fill="url(#hatGrad)" filter="url(#hatShadow)"/>
  
  <!-- Hat top highlight -->
  <path d="M175 140 Q178 95 200 62 Q225 32 256 25 Q280 32 300 55 Q310 72 310 90" 
        fill="white" opacity="0.06"/>

  <!-- Hat band (gradient purple→pink) -->
  <path d="M152 145 Q155 138 165 135 Q210 128 256 126 Q302 128 347 135 Q357 138 360 145 
           Q357 152 347 155 Q302 162 256 164 Q210 162 165 155 Q155 152 152 145 Z" 
        fill="url(#hatBandGrad)"/>
  
  <!-- Skull and crossbones on hat -->
  <!-- Skull -->
  <ellipse cx="256" cy="88" rx="18" ry="20" fill="url(#skullGrad)"/>
  <ellipse cx="256" cy="95" rx="12" ry="8" fill="url(#skullGrad)"/>
  
  <!-- Skull eyes -->
  <ellipse cx="249" cy="84" rx="5" ry="6" fill="#1A1A1A"/>
  <ellipse cx="263" cy="84" rx="5" ry="6" fill="#1A1A1A"/>
  
  <!-- Skull nose -->
  <path d="M254 92 L256 96 L258 92" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1"/>
  
  <!-- Skull smile -->
  <path d="M248 100 L264 100" stroke="#1A1A1A" stroke-width="1.5"/>
  <line x1="251" y1="100" x2="251" y2="103" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="256" y1="100" x2="256" y2="103" stroke="#1A1A1A" stroke-width="1"/>
  <line x1="261" y1="100" x2="261" y2="103" stroke="#1A1A1A" stroke-width="1"/>
  
  <!-- Crossbones -->
  <path d="M228 78 Q245 95 270 108" stroke="url(#skullGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M228 108 Q245 95 270 78" stroke="url(#skullGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Bone ends -->
  <circle cx="226" cy="76" r="4" fill="url(#skullGrad)"/>
  <circle cx="226" cy="110" r="4" fill="url(#skullGrad)"/>
  <circle cx="272" cy="76" r="4" fill="url(#skullGrad)"/>
  <circle cx="272" cy="110" r="4" fill="url(#skullGrad)"/>

  <!-- Hat edge detail (fold lines) -->
  <path d="M145 155 Q150 148 170 145" stroke="#3D3D3D" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M367 155 Q362 148 342 145" stroke="#3D3D3D" stroke-width="1.5" fill="none" opacity="0.5"/>
</svg>