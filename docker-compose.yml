services:
  db:
    image: mariadb:11
    container_name: tentacle-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required - generate with: openssl rand -base64 32}
      MYSQL_DATABASE: ${DB_NAME:-tentacle_db}
      MYSQL_USER: ${DB_USER:-tentacle_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required - generate with: openssl rand -base64 32}
    volumes:
      - tentacle-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/knaox/tentacle-tv:latest
    container_name: tentacle-tv
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://${DB_USER:-tentacle_user}:${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}@db:3306/${DB_NAME:-tentacle_db}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required - generate with: openssl rand -base64 64}
      PORT: "3000"
      HOST: "0.0.0.0"
    ports:
      - "3000:3000"

volumes:
  tentacle-db-data: