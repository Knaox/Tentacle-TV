services:
  db:
    image: mariadb:11
    container_name: tentacle-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-tentacle}
      MYSQL_USER: ${DB_USER:-tentacle}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - tentacle-db-data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: tentacle-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://${DB_USER:-tentacle}:${DB_PASSWORD}@db:3306/${DB_NAME:-tentacle}
      JWT_SECRET: ${JWT_SECRET}
      PORT: "3000"
      HOST: "0.0.0.0"
    ports:
      - "${WEB_PORT:-80}:3000"

volumes:
  tentacle-db-data:
